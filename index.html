<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Forte, Futuro Sustentável</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌱 Agro Forte, Futuro Sustentável</h1>
    <p>Equilíbrio entre produção e meio ambiente</p>
</header>

<section class="painel">
    <div class="card">
        <h2>🌾 Produção</h2>
        <span id="producao">50</span>
    </div>

    <div class="card">
        <h2>🌍 Sustentabilidade</h2>
        <span id="sustentabilidade">50</span>
    </div>
</section>

<section class="acoes">
    <h2>Escolha uma ação:</h2>

    <button onclick="adubar()">
        Fertilizante Orgânico
    </button>

    <button onclick="irrigacao()">
        Irrigação Inteligente
    </button>

    <button onclick="desmatamento()">
        Expandir Plantação
    </button>

    <button onclick="energiaSolar()">
        Energia Solar
    </button>
</section>

<section id="resultado"></section>

<script src="script.js"></script>

</body>
</html>
